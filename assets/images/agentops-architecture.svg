<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/><stop offset="0.55" stop-color="#0b1d33"/><stop offset="1" stop-color="#102b4b"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1"><stop offset="0" stop-color="#152b47"/><stop offset="1" stop-color="#1e3a5f"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000" flood-opacity="0.35"/></filter>
    <style>
      text{font-family:'Apple SD Gothic Neo','Noto Sans CJK KR','Noto Sans KR',Arial,sans-serif;fill:#ecf6ff} .muted{fill:#9fb7cc}.accent{fill:#61dafb}.green{fill:#8ef0b3}.warn{fill:#ffd166}.red{fill:#ff7a90}.small{font-size:26px}.mid{font-size:34px;font-weight:700}.big{font-size:56px;font-weight:800}.label{font-size:22px;fill:#b7c9da}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1370" cy="130" r="260" fill="#1f7aff" opacity="0.12"/>
  <circle cx="180" cy="780" r="260" fill="#6ee7b7" opacity="0.10"/>
  <text x="80" y="95" class="big">OpenClaw AgentOps for Gemini Enterprise</text>
  <text x="82" y="145" class="small muted">PoC Agent를 Production 운영체계로 전환하는 엔터프라이즈 Agent 운영 플랫폼</text>

  <g filter="url(#shadow)">
    <rect x="80" y="220" rx="28" ry="28" width="300" height="150" fill="url(#card)" stroke="#315a85"/>
    <text x="110" y="275" class="mid">Agent Catalog</text>
    <text x="110" y="320" class="label">등록 · Owner · 상태 · 재사용</text>
    <text x="110" y="350" class="label">Draft → Review → Production</text>

    <rect x="460" y="220" rx="28" ry="28" width="320" height="150" fill="url(#card)" stroke="#315a85"/>
    <text x="490" y="275" class="mid">Approval Workflow</text>
    <text x="490" y="320" class="label">보안 · 권한 · 운영 체크리스트</text>
    <text x="490" y="350" class="label">승인/반려/조건부 승인</text>

    <rect x="860" y="220" rx="28" ry="28" width="320" height="150" fill="url(#card)" stroke="#315a85"/>
    <text x="890" y="275" class="mid">Tool Access Control</text>
    <text x="890" y="320" class="label">도구 · 데이터 · 고위험 호출</text>
    <text x="890" y="350" class="label">Least Privilege 정책</text>

    <rect x="1260" y="220" rx="28" ry="28" width="260" height="150" fill="url(#card)" stroke="#315a85"/>
    <text x="1290" y="275" class="mid">GE Runtime</text>
    <text x="1290" y="320" class="label">Gemini Enterprise</text>
    <text x="1290" y="350" class="label">OpenClaw Adapter</text>
  </g>

  <path d="M380 295 H460" stroke="#61dafb" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M780 295 H860" stroke="#61dafb" stroke-width="5"/>
  <path d="M1180 295 H1260" stroke="#61dafb" stroke-width="5"/>

  <g filter="url(#shadow)">
    <rect x="120" y="500" rx="32" width="420" height="230" fill="#10253f" stroke="#294e76"/>
    <text x="160" y="565" class="mid green">Observability</text>
    <text x="160" y="620" class="small">실행 로그 · 실패율 · Latency</text>
    <text x="160" y="660" class="small">비용 · Tool Call · 감사 이력</text>
    <text x="160" y="700" class="small">이상 탐지 1시간 이내</text>

    <rect x="590" y="500" rx="32" width="420" height="230" fill="#10253f" stroke="#294e76"/>
    <text x="630" y="565" class="mid warn">Human Review</text>
    <text x="630" y="620" class="small">품질 이슈 · 환각 의심</text>
    <text x="630" y="660" class="small">고위험 Tool 승인 Queue</text>
    <text x="630" y="700" class="small">개선 백로그 연결</text>

    <rect x="1060" y="500" rx="32" width="420" height="230" fill="#10253f" stroke="#294e76"/>
    <text x="1100" y="565" class="mid accent">Executive Dashboard</text>
    <text x="1100" y="620" class="small">Production 전환율 · ROI</text>
    <text x="1100" y="660" class="small">부서별 확산 · 비용 가시성</text>
    <text x="1100" y="700" class="small">위험 Agent 현황</text>
  </g>

  <text x="80" y="835" class="small muted">MVP: Catalog + Approval + 기본 로그 + Dashboard → Governance/Observability → Enterprise Scale</text>
</svg>